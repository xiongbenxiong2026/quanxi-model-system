<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全犀平台 · 直播间后台</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">
            <img class="logo-img" src="image/logo.png" alt="全犀">
            全犀平台
        </a>
        <div class="navbar-right">
            <span class="role-badge studio">📺 直播间后台</span>
            <span style="font-size:13px;color:var(--gray-500);">直播间 ***</span>
            <a href="index.html" class="btn btn-outline btn-sm">退出</a>
        </div>
    </nav>

    <div class="container">
        <!-- Overview Stats -->
        <div class="stat-grid" id="overviewStats"></div>

        <!-- Main content grid -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;">
            <!-- 品牌入驻看板 -->
            <div class="card">
                <div class="card-header">
                    <h2>🏢 入驻品牌看板</h2>
                    <span style="font-size:13px;color:var(--gray-500);" id="brandCount"></span>
                </div>
                <div class="card-body">
                    <div class="table-container">
                        <table>
                            <thead><tr>
                                <th>品牌</th>
                                <th>品类</th>
                                <th>产品</th>
                                <th>价格带</th>
                                <th>月销</th>
                            </tr></thead>
                            <tbody id="brandTableBody"></tbody>
                        </table>
                    </div>
                    <div id="brandPagination"></div>
                </div>
            </div>

            <!-- 平台销售数据 -->
            <div class="card">
                <div class="card-header">
                    <h2>📊 平台销售数据</h2>
                    <span style="font-size:13px;color:var(--gray-500);">自2026年5月1日上线</span>
                </div>
                <div class="card-body">
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;" id="platformSalesGrid"></div>
                    <div class="mt-3" style="padding:16px;background:var(--primary-bg);border-radius:var(--radius);">
                        <div style="font-size:13px;color:var(--gray-600);margin-bottom:8px;">📈 销售额构成</div>
                        <div id="salesBreakdownBar"></div>
                        <div id="salesBreakdownText" style="font-size:13px;color:var(--gray-600);margin-top:8px;"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 流量方资源 -->
        <div class="card">
            <div class="card-header">
                <h2>🔗 流量方资源</h2>
                <span style="font-size:13px;color:var(--gray-500);">平台合作流量渠道一览</span>
            </div>
            <div class="card-body">
                <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;" id="trafficGrid"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="js/data.js"></script>
    <script src="js/studio.js"></script>
</body>
</html>
